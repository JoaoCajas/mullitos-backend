server:
  port: 9000
spring:
  application:
    name: mullitos-backend-api

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update #create-drop #create, update, none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bd_mullitos?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456